# Cron schedules for automated tasks
# Generate recommendations every 6 hours
[[edge_runtime.scheduler]]
function = "generate-flag-recommendations"
schedule = "0 */6 * * *"

# Check metric alerts every 5 minutes
[[edge_runtime.scheduler]]
function = "check-metric-alerts"
schedule = "*/5 * * * *"

# GitHub backup cron - runs nightly at 2 AM UTC
[[edge_runtime.scheduler]]
function = "github-backup-cron"
schedule = "0 2 * * *"

# Domain health check - runs every 6 hours
[[edge_runtime.scheduler]]
function = "domain-health-check"
schedule = "0 */6 * * *"

# Generate AI recommendations - runs hourly
[[edge_runtime.scheduler]]
function = "generate-ai-recommendations"
schedule = "0 * * * *"

# Send scheduled reports - runs every hour
[[edge_runtime.scheduler]]
function = "send-scheduled-report"
schedule = "0 * * * *"

# Analytics retention cleanup - runs daily at 3 AM UTC
[[edge_runtime.scheduler]]
function = "cleanup-old-analytics"
schedule = "0 3 * * *"

# Schedule drip emails - runs every hour
[[edge_runtime.scheduler]]
function = "schedule-drip-emails"
schedule = "0 * * * *"

# Check milestones and award badges - runs every 30 minutes
[[edge_runtime.scheduler]]
function = "check-milestones"
schedule = "*/30 * * * *"

# Activate scheduled links - runs every 5 minutes
[[edge_runtime.scheduler]]
function = "activate-scheduled-links"
schedule = "*/5 * * * *"

# Pulse Watchdog - detect anomalies hourly
[[edge_runtime.scheduler]]
function = "detect-analytics-anomalies"
schedule = "0 * * * *"

# Check subscription expiry - runs daily at 1 AM UTC
[[edge_runtime.scheduler]]
function = "check-subscription-expiry"
schedule = "0 1 * * *"