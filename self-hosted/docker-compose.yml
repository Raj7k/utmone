version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-utm_one}
      POSTGRES_USER: ${POSTGRES_USER:-utm_one_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-utm_one_user} -d ${POSTGRES_DB:-utm_one}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - utm-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - utm-network

  redirect-service:
    build:
      context: ./redirect-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-utm_one_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-utm_one}
      REDIS_URL: redis://redis:6379
      PORT: 8080
      NODE_ENV: production
    ports:
      - "${REDIRECT_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - utm-network

  # Optional: Caddy reverse proxy with automatic SSL
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - redirect-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - utm-network
    profiles:
      - with-proxy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  utm-network:
    driver: bridge
