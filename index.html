<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Critical CSS - Inline to prevent black screen -->
    <style>
      html, body { background: #050505; color: #fff; margin: 0; padding: 0; }
      .dark html, .dark body { background: #050505; }
    </style>
    
    <!-- No-Flicker Theme Detection (Apple HIG) -->
    <script>
      (function() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else if (stored === 'light') {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    
    <!-- Pre-warm Auth Session Cache Check -->
    <script>
      (function() {
        try {
          var cachedSession = localStorage.getItem('utm_session_cache');
          if (cachedSession) {
            var parsed = JSON.parse(cachedSession);
            if (Date.now() - parsed.timestamp < 15 * 60 * 1000) {
              window.__AUTH_READY__ = true;
              window.__CACHED_USER__ = parsed.user;
            }
          }
        } catch (e) {}
      })();
    </script>
    
    <!-- Critical Resource Preloading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Note: preconnect to the Supabase project is intentionally omitted.
      It used to be hardcoded to an old project URL (whgnsmjdubnvbmarnjfx)
      which broke when the project moved. Vite's built output emits its own
      preload hints for the real Supabase origin via the supabase-js client.
    -->

    <!--
      Previously this file had:
        <link rel="modulepreload" href="/src/main.tsx">
        <link rel="modulepreload" href="/src/App.tsx">
      Vite's production build mishandled those: it inlined main.tsx as a
      base64 data URL with application/octet-stream MIME (the browser refuses
      to execute it as a module) and renamed App.tsx to a hashed filename
      while keeping the .tsx extension (browser rejects due to MIME-type
      sniffing). Both manifested as "Failed to load module script" errors
      followed by cascading failures like "createContext undefined" in
      vendor chunks.
      Vite already emits correct modulepreload hints for the real built
      chunks, so we don't need these manual hints at all. REMOVED.
    -->

    <!-- ALL fonts loaded async - system fonts show immediately, web fonts swap in -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
    
    <!-- DNS Prefetch for third-party resources -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    
    <!-- Google Tag Manager - Deferred for performance -->
    <script>
      // Load GTM after page is interactive to avoid render blocking
      window.addEventListener('load', function() {
        var loadGTM = function() {
          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','GTM-PCNWGGQQ');
        };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGTM, { timeout: 2000 });
        } else {
          setTimeout(loadGTM, 100);
        }
      });
    </script>
    <!-- End Google Tag Manager -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>utm.one - Clean Links Change Everything</title>
    <meta name="description" content="Create branded short links, generate QR codes, and track campaign performance with comprehensive UTM management for your organization." />
    <meta name="author" content="utm.one" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScannerOS" />

    <meta property="og:title" content="utm.one - Clean Links Change Everything" />
    <meta property="og:description" content="Create branded short links, generate QR codes, and track campaign performance with comprehensive UTM management." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://utm.one/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@utmone" />
    <meta name="twitter:image" content="https://utm.one/favicon.png" />
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PCNWGGQQ"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <!-- Instant Skeleton - Shows immediately before ANY JS loads -->
    <style id="instant-skeleton-styles">
      .instant-skeleton {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        transition: opacity 0.2s ease-out;
      }
      .instant-skeleton.hidden {
        opacity: 0;
        pointer-events: none;
      }
      /* Light mode colors */
      .instant-skeleton {
        background: #fafafa;
      }
      .instant-skeleton .sidebar {
        width: 256px;
        border-right: 1px solid rgba(0,0,0,0.08);
        padding: 16px;
        display: none;
      }
      .instant-skeleton .main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .instant-skeleton .header {
        height: 56px;
        border-bottom: 1px solid rgba(0,0,0,0.08);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 16px;
      }
      .instant-skeleton .content {
        flex: 1;
        padding: 24px;
        max-width: 1200px;
      }
      .instant-skeleton .pulse {
        background: rgba(0,0,0,0.06);
        border-radius: 8px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      /* Dark mode */
      .dark .instant-skeleton {
        background: #0a0a0a;
      }
      .dark .instant-skeleton .sidebar {
        border-color: rgba(255,255,255,0.08);
      }
      .dark .instant-skeleton .header {
        border-color: rgba(255,255,255,0.08);
      }
      .dark .instant-skeleton .pulse {
        background: rgba(255,255,255,0.06);
      }
      .dark .instant-skeleton .loading-text {
        color: rgba(255,255,255,0.4);
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @media (min-width: 1024px) {
        .instant-skeleton .sidebar { display: flex; flex-direction: column; gap: 8px; }
      }
    </style>
    
    <div id="root">
      <!-- This skeleton shows instantly, hidden when React hydrates -->
      <div class="instant-skeleton" id="instant-skeleton">
        <div class="sidebar">
          <div class="pulse" style="height:32px;width:120px;margin-bottom:16px"></div>
          <div class="pulse" style="height:36px;width:100%"></div>
          <div class="pulse" style="height:36px;width:100%"></div>
          <div class="pulse" style="height:36px;width:100%"></div>
        </div>
        <div class="main">
          <div class="header">
            <div class="pulse" style="height:32px;width:32px;border-radius:8px"></div>
            <div class="pulse" style="height:24px;width:180px"></div>
            <div style="flex:1"></div>
            <div class="pulse" style="height:32px;width:32px;border-radius:50%"></div>
          </div>
          <div class="content">
            <!-- Visible text ensures FCP detection -->
            <p style="font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:rgba(0,0,0,0.4);margin-bottom:16px" class="loading-text">loading...</p>
            <div class="pulse" style="height:32px;width:240px;margin-bottom:24px"></div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
              <div class="pulse" style="height:96px"></div>
              <div class="pulse" style="height:96px"></div>
              <div class="pulse" style="height:96px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Hide skeleton once React renders -->
    <script>
      window.__hideInstantSkeleton = function() {
        var el = document.getElementById('instant-skeleton');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 200);
        }
        var styles = document.getElementById('instant-skeleton-styles');
        if (styles) styles.remove();
        // Cancel timeout if React rendered successfully
        if (window.__loadingTimeout) {
          clearTimeout(window.__loadingTimeout);
          window.__loadingTimeout = null;
        }
      };
      
      // Timeout fallback - show error if React doesn't render in 45s
      window.__loadingTimeout = setTimeout(function() {
        var skeleton = document.getElementById('instant-skeleton');
        if (skeleton && !skeleton.classList.contains('hidden')) {
          skeleton.innerHTML = '<div style="text-align:center;padding:40px;color:#fff;max-width:400px;margin:auto">' +
            '<h2 style="font-size:20px;margin-bottom:12px;font-weight:600">loading is taking longer than expected</h2>' +
            '<p style="opacity:0.6;font-size:14px;margin-bottom:20px">please refresh the page or check your connection.</p>' +
            '<button onclick="location.reload()" style="padding:12px 24px;background:#fff;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:500">refresh page</button>' +
          '</div>';
        }
      }, 45000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
