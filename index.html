    <!-- No-Flicker Theme Detection (Apple HIG) -->
    <script>
      (function() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else if (stored === 'light') {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    
    <!-- Pre-warm Auth Session + Dashboard Data - Start before React loads -->
    <script>
      (function() {
        // Check for cached session to speed up initial auth
        try {
          const cachedSession = localStorage.getItem('utm_session_cache');
          if (cachedSession) {
            const parsed = JSON.parse(cachedSession);
            // Valid cache = pre-warm successful (15 min expiry)
            if (Date.now() - parsed.timestamp < 15 * 60 * 1000) {
              window.__AUTH_READY__ = true;
              window.__CACHED_USER__ = parsed.user;
              
              // Phase 1: Pre-warm dashboard data fetch IN PARALLEL with auth
              const workspaceId = localStorage.getItem('currentWorkspaceId');
              if (workspaceId && parsed.accessToken) {
                window.__DASHBOARD_PREFETCH__ = { status: 'loading', workspaceId: workspaceId };
                fetch('https://whgnsmjdubnvbmarnjfx.supabase.co/functions/v1/get-dashboard-data', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + parsed.accessToken,
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoZ25zbWpkdWJudmJtYXJuamZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM0ODQyOTgsImV4cCI6MjA3OTA2MDI5OH0.KUMy4nnJ1VXenU8CbF19ZhdAQrQ416OJOeFSMa47MWY'
                  },
                  body: JSON.stringify({ workspaceId: workspaceId, range: '30d' })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                  if (!data.error) {
                    window.__DASHBOARD_PREFETCH__ = { status: 'ready', workspaceId: workspaceId, data: data };
                  }
                })
                .catch(function() {});
              }
            }
          }
        } catch (e) {}
      })();
    </script>
